<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Zadania">
<meta name="theme-color" content="#1a1d27">
<link rel="manifest" href="manifest.json">
<title>Bot zadań</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  background: #0f1117; color: #e8e8e8;
  height: 100dvh; display: flex; flex-direction: column; overflow: hidden;
}

#setup-screen {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 32px 24px; gap: 20px;
}
#setup-screen h2 { font-size: 22px; font-weight: 600; color: #fff; }
#setup-screen p { font-size: 14px; color: #6b7280; text-align: center; line-height: 1.6; max-width: 340px; }
#setup-screen a { color: #818cf8; }
.setup-field { width: 100%; max-width: 380px; display: flex; flex-direction: column; gap: 8px; }
.setup-field label { font-size: 13px; color: #9ca3af; }
.setup-field input {
  background: #1a1d27; border: 1px solid #374151; border-radius: 10px;
  padding: 12px 14px; color: #e8e8e8; font-size: 15px; outline: none; width: 100%;
}
.setup-field input:focus { border-color: #4f46e5; }
#setup-btn {
  background: #4f46e5; color: white; border: none; border-radius: 10px;
  padding: 13px 32px; font-size: 15px; font-weight: 600; cursor: pointer;
  width: 100%; max-width: 380px;
}
#setup-btn:hover { background: #4338ca; }

#app { display: none; flex-direction: column; height: 100dvh; }
#app.visible { display: flex; }

#header {
  background: #1a1d27; border-bottom: 1px solid #2a2d3e;
  padding: 12px 16px; padding-top: max(12px, env(safe-area-inset-top));
  display: flex; align-items: center; gap: 10px; flex-shrink: 0;
}
#header .dot { width: 9px; height: 9px; background: #4ade80; border-radius: 50%; flex-shrink: 0; }
#header h1 { font-size: 15px; font-weight: 600; color: #fff; flex: 1; }
#task-count { font-size: 12px; color: #6b7280; }
#settings-btn { background: none; border: none; color: #6b7280; font-size: 18px; cursor: pointer; padding: 0 4px; }

#users-bar {
  background: #161820; border-bottom: 1px solid #2a2d3e;
  padding: 8px 16px; display: flex; gap: 8px; align-items: center; flex-shrink: 0;
}
#users-bar label { font-size: 12px; color: #6b7280; }
.user-btn {
  padding: 4px 14px; border-radius: 20px; border: 1px solid #2a2d3e;
  background: transparent; color: #9ca3af; font-size: 13px; cursor: pointer; transition: all 0.15s;
}
.user-btn:hover { border-color: #4f46e5; color: #818cf8; }
.user-btn.active { background: #312e81; border-color: #4f46e5; color: #c7d2fe; font-weight: 600; }

.help-hint {
  font-size: 11px; color: #4b5563; padding: 5px 16px 6px;
  background: #161820; border-bottom: 1px solid #2a2d3e;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex-shrink: 0;
}

#chat {
  flex: 1; overflow-y: auto; padding: 16px;
  display: flex; flex-direction: column; gap: 10px;
  -webkit-overflow-scrolling: touch;
}

.msg { display: flex; gap: 8px; max-width: 84%; animation: fadeIn 0.2s ease; }
@keyframes fadeIn { from { opacity:0; transform:translateY(5px); } to { opacity:1; transform:translateY(0); } }
.msg.user { margin-left: auto; flex-direction: row-reverse; }
.msg.bot { margin-right: auto; }

.avatar {
  width: 28px; height: 28px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 10px; font-weight: 700; flex-shrink: 0; margin-top: 2px;
}
.avatar.anton { background: #312e81; color: #c7d2fe; }
.avatar.michal { background: #7f1d1d; color: #fca5a5; }
.avatar.bot { background: #064e3b; color: #6ee7b7; }

.bubble { padding: 9px 13px; border-radius: 14px; font-size: 14px; line-height: 1.5; word-break: break-word; }
.msg.user .bubble { background: #1e1b4b; border: 1px solid #3730a3; color: #e0e7ff; }
.msg.bot .bubble { background: #1a1d27; border: 1px solid #2a2d3e; color: #d1d5db; }

.msg-meta { font-size: 11px; color: #374151; margin-top: 3px; }
.msg.user .msg-meta { text-align: right; }

.task-card {
  background: #111827; border: 1px solid #374151;
  border-radius: 10px; padding: 9px 12px; margin-top: 6px; font-size: 13px;
}
.task-card.done { opacity: 0.45; }
.task-row { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; }
.task-text { flex: 1; line-height: 1.4; }
.task-card.done .task-text { text-decoration: line-through; color: #6b7280; }
.task-pill { font-size: 11px; padding: 2px 8px; border-radius: 10px; font-weight: 600; white-space: nowrap; flex-shrink: 0; }
.pill-anton { background: #1e1b4b; color: #a5b4fc; }
.pill-michal { background: #450a0a; color: #fca5a5; }
.pill-done { background: #052e16; color: #4ade80; }
.pill-obaj { background: #1c1917; color: #d6d3d1; }

.typing {
  display: flex; gap: 4px; align-items: center; padding: 10px 13px;
  background: #1a1d27; border: 1px solid #2a2d3e; border-radius: 14px; width: fit-content;
}
.typing span {
  width: 6px; height: 6px; background: #6b7280; border-radius: 50%;
  animation: bounce 1.2s infinite;
}
.typing span:nth-child(2) { animation-delay: 0.2s; }
.typing span:nth-child(3) { animation-delay: 0.4s; }
@keyframes bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-5px)} }

#input-area {
  background: #1a1d27; border-top: 1px solid #2a2d3e;
  padding: 10px 14px; padding-bottom: max(10px, env(safe-area-inset-bottom));
  display: flex; gap: 8px; align-items: flex-end; flex-shrink: 0;
}
#msg-input {
  flex: 1; background: #111827; border: 1px solid #374151; border-radius: 10px;
  padding: 10px 13px; color: #e8e8e8; font-size: 16px; resize: none; outline: none;
  min-height: 42px; max-height: 110px; font-family: inherit; transition: border-color 0.15s;
  -webkit-appearance: none;
}
#msg-input:focus { border-color: #4f46e5; }
#send-btn {
  background: #4f46e5; border: none; color: white;
  width: 42px; height: 42px; border-radius: 10px; cursor: pointer; font-size: 18px;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
#send-btn:hover { background: #4338ca; }
#send-btn:disabled { background: #374151; cursor: not-allowed; }

::-webkit-scrollbar { width: 3px; }
::-webkit-scrollbar-thumb { background: #374151; border-radius: 3px; }
</style>
</head>
<body>

<div id="setup-screen">
  <div style="font-size: 48px;">✓</div>
  <h2>Bot zadań</h2>
  <p>Wpisz swój klucz Google Gemini API.<br>Znajdziesz go na <a href="https://aistudio.google.com/apikey" target="_blank">aistudio.google.com</a></p>
  <div class="setup-field">
    <label>Klucz API (zaczyna się od AIza...)</label>
    <input type="password" id="api-key-input" placeholder="AIza..." autocomplete="off" spellcheck="false">
  </div>
  <button id="setup-btn" onclick="saveApiKey()">Zacznij</button>
</div>

<div id="app">
  <div id="header">
    <div class="dot"></div>
    <h1>Bot zadań</h1>
    <span id="task-count">0 aktywnych</span>
    <button id="settings-btn" onclick="resetApiKey()" title="Zmień klucz API">⚙</button>
  </div>
  <div id="users-bar">
    <label>Piszę jako:</label>
    <button class="user-btn active" onclick="setUser('Anton', this)">Anton</button>
    <button class="user-btn" onclick="setUser('Michał', this)">Michał</button>
  </div>
  <div class="help-hint">
    Np: "Anton, umów Rafała" · "jakie mam zadania" · "Zapłacona" · "pokaż wszystkie"
  </div>
  <div id="chat"></div>
  <div id="input-area">
    <textarea id="msg-input" placeholder="Napisz wiadomość..." rows="1"></textarea>
    <button id="send-btn" onclick="sendMsg()">↑</button>
  </div>
</div>

<script>
const SYSTEM_PROMPT = `Jesteś asystentem do zarządzania zadaniami dla Antona i Michała.

Zwracasz WYŁĄCZNIE czysty JSON — zero tekstu przed ani po, zero komentarzy, zero backtick-ów.

Formaty:
{"action":"add_task","reply":"...","task":{"text":"...","assignee":"Anton"}}
{"action":"add_task","reply":"...","task":{"text":"...","assignee":"Michał"}}
{"action":"add_task","reply":"...","task":{"text":"...","assignee":"obaj"}}
{"action":"complete_task","reply":"...","complete_id":123456}
{"action":"complete_task","reply":"...","complete_id":null}
{"action":"list_tasks","reply":"...","filter":"Anton"}
{"action":"list_tasks","reply":"...","filter":"Michał"}
{"action":"list_tasks","reply":"...","filter":"all"}
{"action":"chat","reply":"..."}

ZASADY:

add_task — ktoś zleca zadanie:
"Anton, zrób X" → assignee Anton
"Michał, sprawdź X" → assignee Michał
"trzeba X" / "musimy X" → assignee obaj

complete_task — ktoś informuje że coś zrobił:
DOPASUJ KONTEKSTOWO do listy zadań, nie szukaj dosłownego tekstu!
"Zapłacona" + zadanie "sprawdź fakturę" → pasuje
"Umówiony" + zadanie "umów Rafała" → pasuje
"Wysłane" + zadanie "wyślij ofertę" → pasuje
Zwróć complete_id równe ID pasującego zadania. Jeśli nic nie pasuje → complete_id null.

list_tasks — pyta o listę:
"jakie mam zadania" gdy pyta Anton → filter Anton
"jakie mam zadania" gdy pyta Michał → filter Michał
"zadania dla Antona" → filter Anton
"wszystkie zadania" / "pokaż wszystkie" → filter all

chat — wszystko inne

reply: max 1-2 zdania, po polsku.`;

let currentUser = 'Anton';
let tasks = [];
let apiKey = '';

function saveApiKey() {
  const val = document.getElementById('api-key-input').value.trim();
  if (!val.startsWith('AIza')) {
    alert('Klucz powinien zaczynać się od "AIza..."');
    return;
  }
  apiKey = val;
  localStorage.setItem('taskbot_gemini_key', val);
  showApp();
}

function resetApiKey() {
  if (!confirm('Zmienić klucz API?')) return;
  localStorage.removeItem('taskbot_gemini_key');
  apiKey = '';
  document.getElementById('app').classList.remove('visible');
  document.getElementById('setup-screen').style.display = 'flex';
}

function showApp() {
  document.getElementById('setup-screen').style.display = 'none';
  document.getElementById('app').classList.add('visible');
  loadTasks();
  addMessage('bot', 'Cześć! Napisz zadanie albo zapytaj co masz do zrobienia.', 'Bot');
  document.getElementById('msg-input').focus();
}

function setUser(name, btn) {
  currentUser = name;
  document.querySelectorAll('.user-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

function getTime() {
  return new Date().toLocaleTimeString('pl-PL', { hour: '2-digit', minute: '2-digit' });
}

function updateCount() {
  const n = tasks.filter(t => !t.done).length;
  document.getElementById('task-count').textContent = `${n} aktywnych`;
}

function saveTasks() {
  localStorage.setItem('taskbot_tasks', JSON.stringify(tasks));
}

function loadTasks() {
  try {
    const s = localStorage.getItem('taskbot_tasks');
    if (s) tasks = JSON.parse(s);
    updateCount();
  } catch(e) {}
}

function addMessage(role, text, sender, extraHtml) {
  const chat = document.getElementById('chat');
  const div = document.createElement('div');
  div.className = `msg ${role === 'bot' ? 'bot' : 'user'}`;
  const avatarClass = role === 'bot' ? 'bot' : (sender === 'Anton' ? 'anton' : 'michal');
  const avatarLabel = role === 'bot' ? 'AI' : sender[0];
  div.innerHTML = `
    <div class="avatar ${avatarClass}">${avatarLabel}</div>
    <div style="min-width:0">
      <div class="bubble">${text}${extraHtml || ''}</div>
      <div class="msg-meta">${sender} · ${getTime()}</div>
    </div>`;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function showTyping() {
  const chat = document.getElementById('chat');
  const div = document.createElement('div');
  div.className = 'msg bot';
  div.id = 'typing';
  div.innerHTML = `<div class="avatar bot">AI</div><div class="typing"><span></span><span></span><span></span></div>`;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function hideTyping() {
  const el = document.getElementById('typing');
  if (el) el.remove();
}

function pillClass(a) {
  if (a === 'Anton') return 'pill-anton';
  if (a === 'Michał') return 'pill-michal';
  return 'pill-obaj';
}

function renderTasks(list) {
  if (!list.length) return '<div style="color:#4b5563;font-size:13px;margin-top:8px;">Brak zadań.</div>';
  return list.map(t => `
    <div class="task-card ${t.done ? 'done' : ''}">
      <div class="task-row">
        <span class="task-text">${t.text}</span>
        <span class="task-pill ${t.done ? 'pill-done' : pillClass(t.assignee)}">${t.done ? '✓' : t.assignee}</span>
      </div>
    </div>`).join('');
}

async function callAI(userMessage) {
  const activeTasks = tasks.filter(t => !t.done).slice(-20);
  const taskList = activeTasks.length
    ? activeTasks.map(t => `ID:${t.id} [${t.assignee}] "${t.text}"`).join('\n')
    : '(brak aktywnych zadań)';

  const prompt = `${SYSTEM_PROMPT}

Piszący: ${currentUser}
Wiadomość: "${userMessage}"

Aktywne zadania:
${taskList}`;

  const res = await fetch(
    `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${apiKey}`,
    {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        contents: [{ parts: [{ text: prompt }] }],
        generationConfig: { temperature: 0.1, maxOutputTokens: 500 }
      })
    }
  );

  if (!res.ok) {
    const err = await res.text();
    throw new Error(`API ${res.status}: ${err.slice(0, 200)}`);
  }

  const data = await res.json();
  const raw = data.candidates?.[0]?.content?.parts?.[0]?.text || '';
  const match = raw.match(/\{[\s\S]*\}/);
  if (!match) throw new Error(`Nieprawidłowa odpowiedź AI: "${raw.slice(0,100)}"`);
  return JSON.parse(match[0]);
}

async function sendMsg() {
  const input = document.getElementById('msg-input');
  const text = input.value.trim();
  if (!text) return;

  input.value = '';
  input.style.height = 'auto';
  document.getElementById('send-btn').disabled = true;

  addMessage('user', text, currentUser);
  showTyping();

  try {
    const result = await callAI(text);
    hideTyping();

    let reply = result.reply || 'OK.';
    let extraHtml = '';

    if (result.action === 'add_task' && result.task) {
      const t = {
        id: Date.now(),
        text: result.task.text,
        assignee: result.task.assignee || currentUser,
        done: false,
        createdBy: currentUser
      };
      tasks.push(t);
      saveTasks();
      updateCount();
      extraHtml = renderTasks([t]);

    } else if (result.action === 'complete_task') {
      const found = result.complete_id
        ? tasks.find(t => !t.done && t.id === result.complete_id)
        : null;
      if (found) {
        found.done = true;
        saveTasks();
        updateCount();
        extraHtml = renderTasks([found]);
      } else {
        reply = 'Nie znalazłem pasującego zadania. Wpisz "pokaż wszystkie" żeby sprawdzić listę.';
      }

    } else if (result.action === 'list_tasks') {
      const filter = result.filter || 'all';
      const filtered = filter === 'all'
        ? tasks
        : tasks.filter(t => t.assignee === filter || t.assignee === 'obaj');
      const active = filtered.filter(t => !t.done);
      const done = filtered.filter(t => t.done);
      if (!active.length && !done.length) {
        reply = 'Brak zadań' + (filter !== 'all' ? ` dla ${filter}` : '') + '.';
      } else {
        extraHtml = renderTasks([...active, ...done]);
      }
    }

    addMessage('bot', reply, 'Bot', extraHtml);

  } catch(err) {
    hideTyping();
    addMessage('bot', `Błąd: ${err.message}`, 'Bot');
  }

  document.getElementById('send-btn').disabled = false;
  input.focus();
}

document.getElementById('msg-input').addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 110) + 'px';
});
document.getElementById('msg-input').addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMsg(); }
});

// Init
const saved = localStorage.getItem('taskbot_gemini_key');
if (saved && saved.startsWith('AIza')) {
  apiKey = saved;
  showApp();
}
</script>
</body>
</html>
